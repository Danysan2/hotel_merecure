server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── SEO: robots y sitemap sin cache ──────────────────────────
    location = /robots.txt {
        add_header Content-Type text/plain;
        expires 1d;
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        expires 1d;
    }

    # ── React Router ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache largo para assets estáticos ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Video: sin cache agresivo ─────────────────────────────────
    location ~* \.(mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Compresión gzip ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1000;

    # ── Headers de seguridad ──────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # HSTS: el navegador siempre usa HTTPS por 1 año
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP: solo permite recursos del propio dominio + fuentes de Google + Supabase
    add_header Content-Security-Policy "
      default-src 'self';
      script-src  'self' 'unsafe-inline';
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: blob:;
      media-src   'self';
      connect-src 'self' https://n8n-supabase.dtbfmw.easypanel.host;
      frame-src   https://www.google.com https://maps.google.com;
    " always;
}
